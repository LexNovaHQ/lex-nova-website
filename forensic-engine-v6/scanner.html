<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Structural Audit | Lex Nova HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505', 
                        gold: '#C5A059', 
                        marble: '#EAE8E3', 
                        shadow: '#1A1A1A', 
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans:  ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; scroll-behavior: smooth; }
        .hidden-state { display: none !important; }
        .fade-enter { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>

<body class="bg-void text-marble font-sans antialiased selection:bg-gold selection:text-void min-h-screen flex flex-col">

    <nav class="w-full py-8 px-6 md:px-12 flex justify-center md:justify-between items-center z-50 relative border-b border-shadow">
        <div class="flex items-center gap-4">
            <span class="font-serif text-xl tracking-widest text-gold uppercase mt-1">Lex Nova <span class="text-marble opacity-50 text-sm ml-1">HQ</span></span>
        </div>
        <div class="hidden md:flex gap-8 items-center text-marble opacity-80">
            <span class="font-sans text-[10px] tracking-[0.2em] uppercase opacity-50">Forensic Engine v6.0</span>
        </div>
    </nav>

    <main id="app-root" class="flex-grow w-full mx-auto px-6 py-16 flex flex-col items-center transition-all duration-700">
        
        <div id="state-loader" class="w-full text-center fade-enter max-w-3xl">
            <div class="font-serif text-gold text-sm tracking-[0.3em] uppercase animate-pulse">Initializing Diagnostic Engine...</div>
        </div>

        <div id="state-gate" class="hidden-state w-full max-w-xl fade-enter">
            </div>

        <div id="state-vip" class="hidden-state w-full max-w-3xl text-left fade-enter">
            <h2 id="pid-greeting" class="font-serif text-3xl text-marble mb-2"></h2>
            <h1 id="pid-headline" class="font-serif text-5xl text-gold mb-6 italic"></h1>
            
            <div id="pid-badges" class="mb-6 flex flex-wrap gap-2"></div>
            
            <p id="pid-body" class="text-sm text-marble/70 leading-relaxed font-sans mb-10 border-l border-gold/30 pl-4"></p>
            
            <div id="pid-intel" class="hidden-state mb-10">
                <p class="text-[9px] tracking-[0.2em] text-marble opacity-50 uppercase font-bold mb-4">Initial Reconnaissance Data</p>
                <div id="pid-intel-detail"></div>
            </div>

            <button id="pid-start-btn" class="bg-gold text-void px-8 py-4 font-bold text-xs tracking-widest uppercase hover:bg-marble transition-colors w-full md:w-auto shadow-[0_0_15px_rgba(255,215,0,0.15)]">
                Initialize Forensic Audit
            </button>
        </div>

        <div id="state-quiz" class="hidden-state w-full max-w-2xl fade-enter">
            </div>

        <div id="state-dashboard" class="hidden-state w-full max-w-6xl fade-enter">
            </div>

    </main>

    <footer class="flex flex-col items-center py-12 bg-void border-t border-shadow w-full mt-auto">
        <div class="font-serif text-xl tracking-widest text-gold uppercase mb-6">Lex Nova HQ</div>
        <p class="font-sans text-xs text-marble opacity-40 uppercase tracking-widest max-w-2xl leading-relaxed text-center mb-4">Commercial Architecture Practice, Not a Law Firm.<br>Review-Ready Drafts Only. No Attorney-Client Relationship.</p>
        <p class="font-sans text-[10px] text-marble opacity-30">&copy; 2026 Lex Nova HQ. All rights reserved.</p>
    </footer>

    <div id="modal-root" class="fixed inset-0 z-[100] hidden-state flex items-center justify-center p-4 bg-void/90 backdrop-blur-sm"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
