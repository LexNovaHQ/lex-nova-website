<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Structural Audit | Lex Nova HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505', 
                        gold: '#C5A059', 
                        marble: '#EAE8E3', 
                        shadow: '#1A1A1A', 
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans:  ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; scroll-behavior: smooth; }
        .hidden-state { display: none !important; }
        .fade-enter { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* Strict Scrollbar formatting for the Engagement Letter Modal */
        .ln-scroll::-webkit-scrollbar { width: 6px; }
        .ln-scroll::-webkit-scrollbar-track { background: #080808; }
        .ln-scroll::-webkit-scrollbar-thumb { background: #1A1A1A; border-radius: 3px; }
        .ln-scroll::-webkit-scrollbar-thumb:hover { background: #C5A059; }
    </style>
</head>

<body class="bg-void text-marble font-sans antialiased selection:bg-gold selection:text-void min-h-screen flex flex-col">

    <nav class="w-full py-8 px-6 md:px-12 flex justify-center md:justify-between items-center z-50 relative border-b border-shadow">
        <div class="flex items-center gap-4">
            <span class="font-serif text-xl tracking-widest text-gold uppercase mt-1">Lex Nova <span class="text-marble opacity-50 text-sm ml-1">HQ</span></span>
        </div>
        <div class="hidden md:flex gap-8 items-center text-marble opacity-80">
            <span class="font-sans text-[10px] tracking-[0.2em] uppercase opacity-50">Forensic Engine v6.0</span>
        </div>
    </nav>

    <main id="app-root" class="flex-grow w-full max-w-3xl mx-auto px-6 py-16 flex flex-col items-center transition-all duration-700">
        
        <div id="view-loader" class="w-full text-center fade-enter">
            <div class="font-serif text-gold text-sm tracking-[0.3em] uppercase animate-pulse">Initializing Diagnostic Engine...</div>
        </div>

        <div id="view-gate" class="hidden-state w-full fade-enter"></div>

        <div id="view-config" class="hidden-state w-full text-left fade-enter"></div>

        <div id="view-quiz" class="hidden-state w-full max-w-2xl fade-enter"></div>

        <div id="view-dashboard" class="hidden-state w-full fade-enter"></div>

        <div id="view-checkout" class="hidden-state w-full pt-10 fade-enter"></div>

    </main>

    <footer class="flex flex-col items-center py-12 bg-void border-t border-shadow w-full mt-auto">
        <div class="font-serif text-xl tracking-widest text-gold uppercase mb-6">Lex Nova HQ</div>
        <p class="font-sans text-xs text-marble opacity-40 uppercase tracking-widest max-w-2xl leading-relaxed text-center mb-4">Commercial Architecture Practice, Not a Law Firm.<br>Review-Ready Drafts Only. No Attorney-Client Relationship.</p>
        <p class="font-sans text-[10px] text-marble opacity-30">&copy; 2026 Lex Nova HQ.</p>
    </footer>

    <div id="modal-root" class="fixed inset-0 z-[100] hidden-state flex items-center justify-center p-4 bg-void/90 backdrop-blur-sm"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
